<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="claude-island logo">
  <!-- night sky (rounded tile) -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="#0e2a47"/>
  <!-- stars -->
  <circle cx="52" cy="54" r="3" fill="#ffffff" opacity="0.85"/>
  <circle cx="86" cy="32" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="128" cy="48" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="222" cy="96" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="36" cy="98" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="64" cy="130" r="2" fill="#ffffff" opacity="0.4"/>
  <!-- crescent moon -->
  <circle cx="196" cy="52" r="17" fill="#f7e8b0"/>
  <circle cx="203" cy="46" r="14" fill="#0e2a47"/>
  <!-- sea, hugging the bottom rounded corners -->
  <path d="M8 166 H248 V192 A56 56 0 0 1 192 248 H64 A56 56 0 0 1 8 192 Z" fill="#1b6fae"/>
  <rect x="8" y="164" width="240" height="4" fill="#7fd4f7" opacity="0.5"/>
  <!-- waves -->
  <path d="M24 200 q10 -7 20 0 t20 0" stroke="#7fd4f7" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M178 212 q10 -7 20 0 t20 0" stroke="#7fd4f7" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M56 226 q10 -7 20 0 t20 0" stroke="#7fd4f7" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- island -->
  <ellipse cx="128" cy="178" rx="68" ry="24" fill="#e3bf74"/>
  <ellipse cx="128" cy="174" rx="66" ry="22" fill="#f6e2a4"/>
  <!-- palm trunk -->
  <path d="M112 172 C110 144 114 118 130 98" stroke="#8a5a3b" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- palm fronds -->
  <path d="M130 98 C114 84 94 82 78 92" stroke="#35a86a" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M130 98 C146 82 166 80 182 90" stroke="#35a86a" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M130 98 C118 78 102 68 84 68" stroke="#2f8f55" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M130 98 C142 78 158 70 176 70" stroke="#2f8f55" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M130 98 C128 80 132 66 140 56" stroke="#35a86a" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- coconuts -->
  <circle cx="124" cy="102" r="5" fill="#6b4226"/>
  <circle cx="135" cy="105" r="5" fill="#6b4226"/>
  <!-- padlock resting on the sand -->
  <path d="M162 146 v-10 a14 14 0 0 1 28 0 v10" stroke="#e8edf2" stroke-width="8" fill="none" stroke-linecap="round"/>
  <rect x="154" y="144" width="44" height="34" rx="9" fill="#ffd166"/>
  <circle cx="176" cy="157" r="5.5" fill="#0e2a47"/>
  <rect x="173.2" y="159" width="5.6" height="11" rx="2.8" fill="#0e2a47"/>
</svg>
