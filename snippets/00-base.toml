# System baseline, derived from island-default-base.toml (island `create`),
# extended for an interactive agent (TTY/PTY) and DNS resolution.
#
# Landlock semantics: every access listed in [[ruleset]] is DENIED by
# default; only the [[path_beneath]]/[[net_port]] rules below grant access.

abi = 6

[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

# System hierarchies: read + execute only.
[[path_beneath]]
allowed_access = ["abi.read_execute"]
parent = [
    "/bin",
    "/lib",
    "/lib64",
    "/sbin",
    "/usr",
    "/opt",
]

# Safe devices + TTY/PTY (Claude Code is interactive and allocates ptys).
# ABI 5+ restricts ioctls on files opened after sandboxing; abi.read_write
# includes ioctl_dev for these specific paths.
[[path_beneath]]
allowed_access = ["abi.read_write"]
parent = [
    "/dev/full",
    "/dev/null",
    "/dev/random",
    "/dev/urandom",
    "/dev/zero",
    "/dev/tty",
    "/dev/ptmx",
    "/dev/pts",
]

# System configuration and introspection, read-only.
# /run/systemd/resolve: target of the /etc/resolv.conf symlink
# (systemd-resolved).
[[path_beneath]]
allowed_access = ["read_dir", "read_file", "refer"]
parent = [
    "/etc",
]

[[path_beneath]]
allowed_access = ["read_dir", "read_file"]
parent = [
    "/proc",
    "/sys",
    "/run/systemd/resolve",
]
