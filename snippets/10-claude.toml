# Claude Code specific rights.
#
# ${home} and ${project} are defined in 05-vars.toml, generated by the
# claude-island wrapper (files within a single profile compose as a union,
# and variables compose commutatively).

abi = 6

[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

# Claude Code binary: read + execute ONLY.
# The auto-updater therefore cannot write here -> DISABLE_AUTOUPDATER=1 is
# set via profile.toml; updates happen outside the sandbox.
[[path_beneath]]
allowed_access = ["abi.read_execute"]
parent = [
    "${home}/.local/bin",
    "${home}/.local/share/claude",
]

# Claude state and configuration (CLAUDE_CONFIG_DIR points here, which moves
# ~/.claude.json INSIDE this directory and avoids granting renames at the
# root of $HOME).
[[path_beneath]]
allowed_access = ["abi.read_write"]
parent = [
    "${home}/.claude",
]

# Claude Code caches.
[[path_beneath]]
allowed_access = ["abi.read_write"]
parent = [
    "${home}/.cache/claude",
    "${home}/.cache/claude-cli-nodejs",
]

# Git identity, read-only (~/.git-credentials stays denied).
[[path_beneath]]
allowed_access = ["read_file"]
parent = [
    "${home}/.gitconfig",
]

# Rules for ${project} (15-project.toml: rw + exec, or read-only with --ro)
# and for outbound network (30-net.toml: direct ports, or the filtering
# proxy port with --proxy) are generated by the wrapper.
