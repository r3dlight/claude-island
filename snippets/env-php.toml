# PHP environment: composer (php itself lives under /usr, already covered).
# vendor/ is in the project, already granted.

abi = 6

[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

[[path_beneath]]
allowed_access = ["abi.read_write", "abi.read_execute"]
parent = [
    "${home}/.config/composer",
    "${home}/.composer",
]

[[path_beneath]]
allowed_access = ["abi.read_write"]
parent = [
    "${home}/.cache/composer",
]
