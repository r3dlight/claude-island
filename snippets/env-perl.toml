# Perl environment: local::lib and CPAN caches (perl lives under /usr).

abi = 6

[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

[[path_beneath]]
allowed_access = ["abi.read_write", "abi.read_execute"]
parent = [
    "${home}/perl5",
]

[[path_beneath]]
allowed_access = ["abi.read_write"]
parent = [
    "${home}/.cpan",
    "${home}/.cpanm",
]
