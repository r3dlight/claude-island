# Elixir/Erlang environment: mix (archives, escripts), hex, rebar3.

abi = 6

[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

[[path_beneath]]
allowed_access = ["abi.read_write", "abi.read_execute"]
parent = [
    "${home}/.mix",
]

[[path_beneath]]
allowed_access = ["abi.read_write"]
parent = [
    "${home}/.hex",
    "${home}/.cache/rebar3",
]
