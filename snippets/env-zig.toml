# Zig environment: global cache (the compiler lives under /usr or in the
# project; build artifacts are in the project).

abi = 6

[[ruleset]]
handled_access_fs = ["abi.all"]
handled_access_net = ["abi.all"]
scoped = ["abi.all"]

[[path_beneath]]
allowed_access = ["abi.read_write"]
parent = [
    "${home}/.cache/zig",
]
