name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Unit tests (leak detection logic; the Landlock canaries are local)
        run: cargo test --release

      - name: Validate embedded Landlock snippets (TOML)
        run: |
          python3 - <<'PY'
          import glob, tomllib, sys
          bad = 0
          for f in sorted(glob.glob("snippets/*.toml")):
              try:
                  tomllib.load(open(f, "rb"))
              except Exception as e:
                  print(f"invalid TOML: {f}: {e}")
                  bad += 1
          sys.exit(1 if bad else 0)
          PY

      # Publish the release binary (built above) so a green run yields a
      # downloadable, checked build.
      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: claude-island-linux-x86_64
          path: target/release/claude-island
          if-no-files-found: error

    # The Landlock canary suite (`claude-island check`) is a LOCAL test: it
    # needs Landlock ABI 6 (Linux 6.12+), which the GitHub runners predate.

  # On a version tag (v*), publish a GitHub Release with the binary that the
  # build job produced and checked. Runs only after `build` is green.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download the checked release binary
        uses: actions/download-artifact@v4
        with:
          name: claude-island-linux-x86_64

      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv claude-island claude-island-linux-x86_64
          gh release create "${{ github.ref_name }}" \
            claude-island-linux-x86_64 \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
